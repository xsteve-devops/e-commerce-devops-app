
name: ad-service-ci

on:
    push:
        branches: 
        - main 
        - 'ci/ad-service-workflow'

        paths:
        - 'src/ad/**'
        - '.github/workflows/ad-service-ci.yaml'
        - 'sonar-project.properties'

    pull_request:
        branches: 
        - main
        paths:
        - 'src/ad/**'
        - '.github/workflows/ad-service-ci.yaml'
        - 'sonar-project.properties'

env:
    IMAGE_NAME: ad-service
    IMAGE_TAG: ${{ github.sha }}

jobs:
    quality-check:
        name: Quality Check
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: src/ad

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Make Gradle wrapper executable
          run: chmod +x ./gradlew

        - name: Build application   
          run: ./gradlew --no-daemon installDist -PprotoSourceDir=./pb

        - name: SonarCloud Scan
          if: github.ref == 'refs/heads/main'
          uses: sonarsource/sonarqube-scan-action@v6
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    docker-build:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: quality-check

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f src/ad/Dockerfile src/ad
         
        - name: Scan Docker image with Trivy
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            image-ref: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '0'
            ignore-unfixed: true
            vuln-type: os,library
            severity: HIGH,CRITICAL

        - name: Login to Docker Hub
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Push Docker image
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          run: docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}