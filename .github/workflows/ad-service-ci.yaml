
name: ad-service-ci

on:
    push:
        branches: 
        - main 

        paths:
        - 'src/ad/**'
        - '.github/workflows/ad-service-ci.yaml'


    pull_request:
        branches: 
        - main

env:
    IMAGE_NAME: ad-service
    IMAGE_TAG: ${{ github.sha }}

jobs:
    quality-check:
        name: Ad Service Quality Check
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: src/ad

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: 'gradle'

        - name: Make Gradle wrapper executable
          run: chmod +x ./gradlew

        - name: Build application   
          run: ./gradlew --no-daemon installDist -PprotoSourceDir=./pb

    docker-build:
        name: Ad Service Docker Build
        runs-on: ubuntu-latest
        needs: quality-check

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f src/ad/Dockerfile src/ad
         
        - name: Scan Docker image with Trivy
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            image-ref: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '0'
            ignore-unfixed: true
            vuln-type: os,library
            severity: HIGH,CRITICAL

        - name: Login to Docker Hub
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Push Docker image
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          run: docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
  
    update-infra-repo:
        name: Ad Service Update Infra Repository
        runs-on: ubuntu-latest
        needs: docker-build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        env:
            IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/ad-service:${{ github.sha }}
            INFRA_REPO: e-commerce-devops-infra
        steps:
        - name: Checkout infra repo
          uses: actions/checkout@v4
          with:
            repository: ${{ github.repository_owner }}/${{ env.INFRA_REPO }}
            token: ${{ secrets.INFRA_REPO_TOKEN }}
            path: infra-repo
        
        - name: Update service image tag
          run: |
            cd infra-repo
            sed -i "s|image: .*ad-service:.*$|image: ${{ env.IMAGE }}|" kubernetes/core-services/ad/deploy.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add kubernetes/core-services/ad/deploy.yaml
            git commit -m "deploy: update ad service image tag to ${{ github.sha }}"
            git push