
name: ad-service-ci

on:
    push:
        branches: 
        - main 
        - 'ci/ad-service-workflow'
        paths:
        - 'src/ad/**'
        - '.github/workflows/ad-service-ci.yaml'
    pull_request:
        branches: 
        - main
        paths:
        - 'src/ad/**'
        - '.github/workflows/ad-service-ci.yaml'

env:
    IMAGE_NAME: ad-service

jobs:
    gradle-build:
        name: Gradle Build
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: src/ad

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        - name: Make Gradle wrapper executable
          run: chmod +x ./gradlew

        - name: Build application   
          run: ./gradlew --no-daemon installDist -PprotoSourceDir=./pb

    docker-build:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: gradle-build

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:test -f src/ad/Dockerfile src/ad

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Push Docker image
          run: docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:test