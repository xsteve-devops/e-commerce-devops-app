name: sonarcloud-scan

on:
    push:
        branches: 
        - main
        paths:
        - 'src/ad/**'
        - 'src/product-catalog/**'
        - 'sonar-project.properties'
        - '.github/workflows/sonarcloud-scan.yaml'

jobs:
    sonarcloud-scan:
        name: SonarCloud Scan
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
                fetch-depth: 0

          - name: Set up JDK 21
            uses: actions/setup-java@v4
            with:
                java-version: '21'
                distribution: 'temurin'
                cache: 'gradle'

          - name: Build Ad Service
            working-directory: src/ad
            run: |
                chmod +x ./gradlew
                ./gradlew --no-daemon installDist -PprotoSourceDir=./pb

          - name: Set up golang
            uses: actions/setup-go@v5
            with:
                go-version: '1.22'
                cache-dependency-path: src/product-catalog/go.sum

          - name: Build Product Catalog
            working-directory: src/product-catalog
            run: |
                go mod download
                go vet ./...
                go test ./...
                go build -o /tmp/product-catalog .

          - name: SonarCloud Scan
            uses: sonarsource/sonarqube-scan-action@v6
            env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}