
name: product-catalog-service-ci

on:
    push:
        branches:
        - main
        paths:
        - 'src/product-catalog/**'
        - 'sonar-project.properties'

    pull_request:
        branches:
        - main

env:
    IMAGE_NAME: product-catalog-service
    IMAGE_TAG: ${{ github.sha }}

jobs:
    product-catalog-quality-check:
        name: Quality Check
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: src/product-catalog

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up golang
          uses: actions/setup-go@v5
          with:
            go-version: '1.22'
            cache-dependency-path: src/product-catalog/go.sum
        
        - name: Download Go modules
          run: go mod download

        - name: Run go vet
          run: go vet ./...
        
        - name: Run go test
          run: go test ./...
        
        - name: Run go build
          run: go build -o product-catalog .

        - name: SonarCloud Scan
          if: github.ref == 'refs/heads/main'
          uses: sonarsource/sonarqube-scan-action@v6
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        

    product-catalog-docker-build:
        name: Docker Build
        runs-on: ubuntu-latest
        needs: product-catalog-quality-check

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f src/product-catalog/Dockerfile src/product-catalog

        - name: Scan Docker image with Trivy
          uses: aquasecurity/trivy-action@v0.36.0
          with:
            image-ref: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            format: table
            exit-code: '0'
            ignore-unfixed: true
            vuln-type: os,library
            severity: HIGH,CRITICAL

        - name: Login to Docker Hub
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          uses: docker/login-action@v3
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        
        - name: Push Docker image
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          run: docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

    product-catalog-update-infra-repo:
        name: Update Infra Repository
        runs-on: ubuntu-latest
        needs: product-catalog-docker-build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        env:
            IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/product-catalog-service:${{ github.sha }}
            INFRA_REPO: e-commerce-devops-infra
        steps:
        - name: Checkout infra repo
          uses: actions/checkout@v4
          with:
            repository: ${{ github.repository_owner }}/${{ env.INFRA_REPO }}
            token: ${{ secrets.INFRA_REPO_TOKEN }}
            path: infra-repo
        
        - name: Update service image tag
          run: |
            cd infra-repo
            sed -i "s|image: .*product-catalog-service:.*$|image: ${{ env.IMAGE }}|" kubernetes/core-services/product-catalog/deploy.yaml
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add kubernetes/core-services/product-catalog/deploy.yaml
            git commit -m "deploy: update product-catalog service image tag to ${{ github.sha }}"
            git push